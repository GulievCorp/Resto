<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ресторан</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;1,300;1,400&family=Roboto:wght@100&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="container">
            <div class="header-line">
                <div class="header-logo">
                    <img src="./assets//img/logo.png" alt="">
                </div>

                <nav>
                    <a class="nav-item" href="#">Главная</a>
                    <a class="nav-item" href="#">Меню</a>
                    <a class="nav-item" href="#">О нас</a>
                    <a class="nav-item" href="#">Бронь</a>
                </nav>

                <div class="cart">
                    <a href="#">
                        <img class="cart-img" src="./assets/img/cart.png" alt="">
                    </a>
                </div>

                <div class="phone">
                    <div class="phone-holder">
                        <div class="phone-img">
                            <img src="./assets/img/phone.png" alt="">
                        </div>
                        <div class="number">
                            <a class="num" href="*">+999-888-76-54</a>
                        </div>
                    </div>
                    <div class="phone-text">
                        <a href="*">Свяжитесь с нами для <br>
                            бронирования</a>
                    </div>
                </div>

                <div class="btn">
                    <a class="button" href="*">ЗАКАЗ СТОЛИКА</a>
                </div>
            </div>
        </div>
    </header>
</body>

</html>
